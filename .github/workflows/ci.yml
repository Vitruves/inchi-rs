name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Builds the vendored InChI C library (gcc on Linux, clang on macOS,
      # MSVC on Windows) and runs the unit, integration, and doc tests.
      - run: cargo build --workspace --verbose
      - run: cargo test --workspace --verbose

  lint:
    name: fmt + clippy + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: MSRV (Rust 1.77)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.77
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  bindgen:
    name: regenerate-bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `bindgen` needs libclang; verify the bindings still regenerate cleanly.
      - run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - run: cargo build -p inchi-sys --features regenerate-bindings
